FLGS="-march=native -O2 -pipe"
CFLAGS="${FLGS}"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${FLGS}"
FFLAGS="${FCFLAGS}"
MAKEOPTS="-j5 -l4"

PKGDIR="/usr/portage/packages"
PORTDIR="/usr/portage"
DISTDIR="/usr/portage/distfiles"

PORTAGE_NICENESS=15
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"
EMERGE_DEFAULT_OPTS="--verbose --keep-going --jobs 4 --load-average 4"
CCACHE_SIZE="10G"

FEATURES="ccache cgroup collision-protect
-ebuild-locks
fakeroot
-mirror mount-sandbox
noinfo
parallel-fetch parallel-install preserve-libs
split-log strict-keepdir
xattr"

USE="bash-completion -bluetooth
-consolekit
elogind
libressl
pulseaudio
vdpau
wayland"

ACCEPT_KEYWORDS="~amd64"
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"
INPUT_DEVICES="libinput wacom"
L10N="en-US"
VIDEO_CARDS="amdgpu radeonsi"

LC_MESSAGES=C
