Section "Monitor"
	Identifier	"Monitor0"
	DisplaySize	531 299
	Option "DPMS"	"true"
EndSection

Section "Device"
	Identifier	"Device0"
	Driver		"amdgpu"
EndSection

Section "Screen"
	Identifier	"Screen0"
	Device		"Device0"
	Monitor		"Monitor0"
	DefaultDepth	24
	SubSection	"Display"
		Depth	24
	EndSubSection
EndSection

Section "ServerLayout"
	Identifier "ServerLayout0"
	Option "StandbyTime"	"10"
	Option "SuspendTime"	"20"
	Option "OffTime"	"30"
	Option "BlankTime"	"0"
EndSection
