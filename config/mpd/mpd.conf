audio_output {
	type		"pulse"
	name		"pulseaudio"
}

audio_output {
	type		"fifo"
	name		"my_fifo"
	path		"/tmp/mpd.fifo"
	format		"44100:16:2"
}

db_file			"~/.config/mpd/database"
log_file		"~/.config/mpd/log"
music_directory		"~/mu"
playlist_directory	"~/mu/playlist"
pid_file		"/tmp/mpd-pid"
state_file		"~/.config/mpd/state"
sticker_file		"~/.config/mpd/sticker.sql"
restore_paused		"yes"
bind_to_address		"localhost"
port			"6600"
auto_update		"yes"
