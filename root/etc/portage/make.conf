# WARNING: Changing your CHOST is not something that should be done lightly.
# Please consult https://wiki.gentoo.org/wiki/Changing_the_CHOST_variable before changing.
CHOST="x86_64-gentoo-linux-musl"

CC="clang"
CXX="clang++"
LD="ld.lld"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"

COMMON_FLAGS="-march=native -O3 -flto=thin -pipe -falign-functions=32"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

CGO_CFLAGS="${COMMON_FLAGS}"
CGO_CXXFLAGS="${COMMON_FLAGS}"
CGO_FFLAGS="${COMMON_FLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"
MAKEOPTS="-j4"

CLEAN_DELAY=3
EMERGE_DEFAULT_OPTS="--ask-enter-invalid --keep-going y --misspell-suggestions n -v"
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"
PORTAGE_NICENESS=2

CCACHE_BASEDIR="${PORTAGE_TMPDIR}/portage"
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="4Gi"
CCACHE_SLOPPINESS="file_stat_matches,include_file_ctime,include_file_mtime,locale,pch_defines,time_macros"
FEATURES="ccache"

ACCEPT_KEYWORDS="~amd64"

# These are the default useflags for the desktop profile
# 3 October 2020
DESKTOP_USE="
	a52 aac acpi alsa
	bluetooth branding
	cairo cdda cdr cups
	dbus dri dts dvd dvdr
	elogind emboss encode exif
	flac
	gif gpm gtk gui
	icu
	jpeg
	lcms libnotify lto
	mad mng mp3 mp4 mpeg
	ogg opengl
	pango pdf png policykit ppds
	qt5
	sdl spell startup-notification svg
	tiff truetype
	udev udisks unicode upower usb
	vorbis
	wxwidgets
	X xcb x264 xml xv xvid
"

# These are my additions/subtrations
USE="${DESKTOP_USE}
	-a52
	-bluetooth
	-cdda -cdr -cups
	-dvd -dvdr
	-pdf -ppds pulseaudio
	-qt5
	vaapi vulkan
	wayland
	zstd
"
INPUT_DEVICES="libinput wacom"
L10N="en-US"
MICROCODE_SIGNATURES="-S"
VIDEO_CARDS="amdgpu radeonsi"

DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"
PORTDIR="/var/db/repos/gentoo"
PORTAGE_LOGDIR="/var/log/portage"

LC_MESSAGES=C
