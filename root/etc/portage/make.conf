CC="clang"
CXX="clang++"
LD="ld.lld"

NTHREADS="thin"
source make.conf.lto

COMMON_FLAGS="-march=native ${CFLAGS} -pipe -falign-functions=32"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="-stdlib=libc++ ${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
LDFLAGS="-Wl,--as-needed -fuse-ld=lld -rtlib=compiler-rt -unwindlib=libunwind"

CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"
MAKEOPTS="-j4"

CLEAN_DELAY=3
EMERGE_DEFAULT_OPTS="--ask-enter-invalid --keep-going y --misspell-suggestions n -v"
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"
PORTAGE_NICENESS=15

CCACHE_SIZE="25Gi"
FEATURES="ccache"

ACCEPT_KEYWORDS="~amd64"
USE="
    -a52
    -bluetooth
    -cdda -cdr -cups
    -dvd -dvdr
    -gtk
    -kmod
    libressl
    pulseaudio
    -qt5
    vaapi vulkan
    wayland
    -X
    zstd
"
CURL_SSL="libressl"
INPUT_DEVICES="libinput wacom"
L10N="en-US"
MICROCODE_SIGNATURES="-S"
VIDEO_CARDS="amdgpu radeonsi"

DISTDIR=/var/cache/distfiles
PKGDIR=/var/cache/binpkgs
PORTAGE_LOGDIR=/var/log/portage
PORTDIR=/var/db/repos/gentoo

LC_MESSAGES=C
