NTHREADS="4"

source make.conf.lto

CFLAGS="-march=native ${CFLAGS} -pipe -falign-functions=32"
CXXFLAGS="${CFLAGS}"
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"
MAKEOPTS="-j${NTHREADS}"

PKGDIR="/var/cache/binpkgs"
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"

PORTAGE_NICENESS=15
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"
EMERGE_DEFAULT_OPTS="--verbose --keep-going=y"
CCACHE_SIZE="10G"

FEATURES="ccache"

USE="-a52 -aac -acpi
-bluetooth -branding bash-completion
-cairo -cdda -cdr -cups
-dts -dvd -dvdr -emboss
-flac
-gtk
-kmod
-ldap libressl
-mad -mng -mpeg
-ogg
-pdf -ppds pulseaudio
-qt5
-spell
-tiff
-vorbis vaapi vulkan
-udisks -upower
-wxwidgets wayland
-X -xcb -xml -xv -xvid"

ACCEPT_KEYWORDS="~amd64"

VIDEO_CARDS="amdgpu radeonsi"
INPUT_DEVICES="libinput wacom"
L10N="en-US"

LC_MESSAGES=C
