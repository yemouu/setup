FLGS="-march=native -O2 -pipe"
CFLAGS="${FLGS}"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${FLGS}"
FFLAGS="${FCFLAGS}"
MAKEOPTS="-j5 -l4"

PKGDIR="/var/cache/binpkgs"
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"

PORTAGE_NICENESS=15
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"
EMERGE_DEFAULT_OPTS="--verbose --keep-going=y --load-average 4"
CCACHE_SIZE="10G"

FEATURES="ccache cgroup collision-protect
-ebuild-locks
fakeroot
-mirror mount-sandbox
noinfo
parallel-fetch parallel-install preserve-libs
split-log strict-keepdir
xattr"

USE="-a52 -aac -acpi
-bluetooth -branding bash-completion
-cairo -cdda -cdr -consolekit -cups
-dts -dvd -dvdr -emboss
elogind
-flac
-gtk
-kmod
-ldap libressl
-mad -mng -mpeg
-ogg
-pdf -ppds pulseaudio
-qt5
-spell
-tiff
-vorbis vaapi vulkan
-udisks -upower
-wxwidgets wayland
-X -xcb -xml -xv -xvid"

ACCEPT_KEYWORDS="~amd64"

CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"
INPUT_DEVICES="libinput wacom"
L10N="en-US"
VIDEO_CARDS="amdgpu radeonsi"
CURL_SSL="libressl"

LC_MESSAGES=C
